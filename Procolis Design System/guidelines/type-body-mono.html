<!-- @dsCard group="Type" viewport="700x200" name="Body & mono" subtitle="Manrope for prose · JetBrains Mono for codes, prices, PIN" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-card)}
  .row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid var(--slate-100)}
  .row:last-child{border:0}
  .spec{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:88px;flex:none}
  .mono-lg{font-family:var(--font-mono);font-weight:700;font-size:20px;color:var(--text-strong);letter-spacing:-.01em}
  .price{font-family:var(--font-mono);font-weight:700;font-size:18px;color:var(--teal-600)}
</style></head>
<body>
  <div class="row"><span class="spec">15 / 400</span><span class="pc-body">Le colis a été ramassé par le chauffeur et part en transit.</span></div>
  <div class="row"><span class="spec">13 / 500</span><span class="pc-sm">Expédié il y a 2 h · Garage de Cocody</span></div>
  <div class="row"><span class="spec">Mono · code</span><span class="mono-lg">PC-7F3K-2291</span></div>
  <div class="row"><span class="spec">Mono · prix</span><span class="price">12&nbsp;500 FCFA</span><span class="price" style="color:var(--amber-500)">+150&nbsp;pts</span></div>
</body></html>
