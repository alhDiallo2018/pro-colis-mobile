<!-- @dsCard group="Brand" viewport="700x160" name="Signature gradient" subtitle="green → teal → deep-blue · hero & score surfaces only" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-display)}
  .band{height:72px;border-radius:var(--radius-lg);background:var(--gradient-brand);display:flex;align-items:center;padding:0 22px;box-shadow:var(--shadow-brand)}
  .label{color:#fff}
  .ov{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.8}
  .bal{font-family:var(--font-mono);font-weight:700;font-size:24px;margin-top:2px}
  .code{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
  .row{display:flex;align-items:center;margin-top:12px}
</style></head>
<body>
  <div class="band">
    <div class="label">
      <div class="ov">Solde de points</div>
      <div class="bal">2&nbsp;450 pts</div>
    </div>
  </div>
  <div class="row"><span class="code">--gradient-brand · 135° · #0FA958 → #018982 → #0C6E7D</span></div>
</body></html>
