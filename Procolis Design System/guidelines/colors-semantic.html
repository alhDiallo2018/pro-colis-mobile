<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & feedback" subtitle="Roles agents should reach for, not raw scales" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--surface-card);font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:38px}
  .meta{padding:6px 8px}
  .name{font-family:var(--font-display);font-weight:700;font-size:11px;color:var(--text-strong)}
  .tok{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);margin-top:1px}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--color-primary)"></div><div class="meta"><div class="name">Primary</div><div class="tok">--color-primary</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><div class="meta"><div class="name">Accent</div><div class="tok">--color-accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-express)"></div><div class="meta"><div class="name">Express</div><div class="tok">--color-express</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-info)"></div><div class="meta"><div class="name">Info</div><div class="tok">--color-info</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-success)"></div><div class="meta"><div class="name">Success</div><div class="tok">--color-success</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-warning)"></div><div class="meta"><div class="name">Warning</div><div class="tok">--color-warning</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-danger)"></div><div class="meta"><div class="name">Danger</div><div class="tok">--color-danger</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-page);box-shadow:inset 0 0 0 1px var(--border-subtle)"></div><div class="meta"><div class="name">Page</div><div class="tok">--surface-page</div></div></div>
  </div>
</body></html>
