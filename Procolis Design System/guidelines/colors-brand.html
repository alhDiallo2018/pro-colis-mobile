<!-- @dsCard group="Colors" viewport="700x150" name="Brand core" subtitle="The four mark colors: teal primary, green, amber, red express" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle)}
  .chip{height:64px}
  .meta{padding:8px 10px}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--text-strong)}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:2px}
  .role{font-size:10px;color:var(--text-faint);margin-top:1px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#018982"></div><div class="meta"><div class="name">Teal</div><div class="hex">#018982</div><div class="role">Primary</div></div></div>
    <div class="sw"><div class="chip" style="background:#0FA958"></div><div class="meta"><div class="name">Green</div><div class="hex">#0FA958</div><div class="role">Motion · success</div></div></div>
    <div class="sw"><div class="chip" style="background:#FCA202"></div><div class="meta"><div class="name">Amber</div><div class="hex">#FCA202</div><div class="role">Points · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#E5240F"></div><div class="meta"><div class="name">Red</div><div class="hex">#E5240F</div><div class="role">Express · danger</div></div></div>
  </div>
</body></html>
