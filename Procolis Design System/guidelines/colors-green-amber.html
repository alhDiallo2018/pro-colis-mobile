<!-- @dsCard group="Colors" viewport="700x130" name="Green & amber scales" subtitle="Motion green and points amber ramps" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body);display:flex;flex-direction:column;gap:10px}
  .ramp{display:flex;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border-subtle)}
  .c{flex:1;height:40px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px}
  .l{font-family:var(--font-mono);font-size:9px}
</style></head>
<body>
  <div class="ramp">
    <div class="c" style="background:var(--green-50)"><span class="l" style="color:#0A6334">50</span></div>
    <div class="c" style="background:var(--green-100)"><span class="l" style="color:#0A6334">100</span></div>
    <div class="c" style="background:var(--green-200)"><span class="l" style="color:#0A6334">200</span></div>
    <div class="c" style="background:var(--green-300)"><span class="l" style="color:#fff">300</span></div>
    <div class="c" style="background:var(--green-400)"><span class="l" style="color:#fff">400</span></div>
    <div class="c" style="background:var(--green-500)"><span class="l" style="color:#fff">500</span></div>
    <div class="c" style="background:var(--green-600)"><span class="l" style="color:#fff">600</span></div>
    <div class="c" style="background:var(--green-700)"><span class="l" style="color:#fff">700</span></div>
    <div class="c" style="background:var(--green-800)"><span class="l" style="color:#fff">800</span></div>
  </div>
  <div class="ramp">
    <div class="c" style="background:var(--amber-50)"><span class="l" style="color:#9A5B00">50</span></div>
    <div class="c" style="background:var(--amber-100)"><span class="l" style="color:#9A5B00">100</span></div>
    <div class="c" style="background:var(--amber-200)"><span class="l" style="color:#9A5B00">200</span></div>
    <div class="c" style="background:var(--amber-300)"><span class="l" style="color:#9A5B00">300</span></div>
    <div class="c" style="background:var(--amber-400)"><span class="l" style="color:#9A5B00">400</span></div>
    <div class="c" style="background:var(--amber-500)"><span class="l" style="color:#fff">500</span></div>
    <div class="c" style="background:var(--amber-600)"><span class="l" style="color:#fff">600</span></div>
    <div class="c" style="background:var(--amber-700)"><span class="l" style="color:#fff">700</span></div>
  </div>
</body></html>
