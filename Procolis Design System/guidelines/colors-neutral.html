<!-- @dsCard group="Colors" viewport="700x130" name="Neutral slate" subtitle="Cool slate ramp, tuned toward teal — text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--surface-card);font-family:var(--font-body)}
  .ramp{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle)}
  .c{flex:1;height:72px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px}
  .l{font-family:var(--font-mono);font-size:10px}
</style></head>
<body>
  <div class="ramp">
    <div class="c" style="background:var(--slate-0);box-shadow:inset 0 0 0 1px var(--border-subtle)"><span class="l" style="color:#677474">0</span></div>
    <div class="c" style="background:var(--slate-50)"><span class="l" style="color:#677474">50</span></div>
    <div class="c" style="background:var(--slate-100)"><span class="l" style="color:#677474">100</span></div>
    <div class="c" style="background:var(--slate-200)"><span class="l" style="color:#677474">200</span></div>
    <div class="c" style="background:var(--slate-300)"><span class="l" style="color:#333D3D">300</span></div>
    <div class="c" style="background:var(--slate-400)"><span class="l" style="color:#fff">400</span></div>
    <div class="c" style="background:var(--slate-500)"><span class="l" style="color:#fff">500</span></div>
    <div class="c" style="background:var(--slate-600)"><span class="l" style="color:#fff">600</span></div>
    <div class="c" style="background:var(--slate-700)"><span class="l" style="color:#fff">700</span></div>
    <div class="c" style="background:var(--slate-800)"><span class="l" style="color:#fff">800</span></div>
    <div class="c" style="background:var(--slate-900)"><span class="l" style="color:#fff">900</span></div>
  </div>
</body></html>
