<!-- @dsCard group="Mobile App" viewport="460x800" name="App (client)" subtitle="Interactive client app — login, dashboard, new colis, suivi, libre service, profil" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRO COLIS — Application mobile</title>
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%}
  body{background:#0a3a43;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;font-family:var(--font-body)}
  .stage{display:flex;gap:40px;align-items:center}
  .phone{position:relative;width:390px;height:800px;background:var(--surface-page);border-radius:46px;box-shadow:0 0 0 12px #11181b, 0 0 0 14px #2a3338, 0 30px 70px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column}
  .statusbar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:transparent;position:absolute;top:0;left:0;right:0;z-index:30;color:var(--text-strong)}
  .statusbar.onbrand{color:#fff}
  .topspacer{height:46px;flex:none;background:var(--surface-card)}
  .statusbar .time{font-family:var(--font-display);font-weight:700;font-size:14px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:108px;height:30px;background:#11181b;border-radius:16px;z-index:6}
  .appwrap{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}
  .screen{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .fab{position:absolute;right:18px;bottom:84px;z-index:20}
  .tabbarwrap{flex:none}
  .hint{color:#8aa;max-width:230px;font-family:var(--font-body)}
  .hint h1{font-family:var(--font-display);color:#fff;font-size:22px;margin:0 0 10px}
  .hint p{font-size:13.5px;line-height:1.6;margin:0 0 14px}
  .hint code{font-family:var(--font-mono);color:var(--amber-300);font-size:12px}
  @media (max-width:780px){ .hint{display:none} }
</style></head>
<body>
<div class="stage">
  <div class="phone" id="phone"></div>
  <div class="hint">
    <h1>PRO COLIS</h1>
    <p>Maquette interactive de l’application client. Connectez-vous (OTP&nbsp;: tapez n’importe quels chiffres, ou utilisez le <code>code PIN</code>), créez un colis, suivez-le, et explorez le libre&nbsp;service.</p>
    <p>Reconstruction fidèle à la marque d’après le cahier des charges — pas une copie pixel de l’app Flutter.</p>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="mock.js"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-detail.jsx"></script>
<script type="text/babel" data-presets="react">
const NS = window.ProcolisDesignSystem_1720b4;
const { TabBar, Fab } = NS;
const S = window.PCScreens;

function StatusBar({ brand }) {
  return (
    <div className={'statusbar' + (brand ? ' onbrand' : '')}>
      <span className="time">9:41</span>
      <span className="icons">
        <span className="material-symbols-rounded" style={{fontSize:17}}>signal_cellular_alt</span>
        <span className="material-symbols-rounded" style={{fontSize:17}}>wifi</span>
        <span className="material-symbols-rounded" style={{fontSize:19}}>battery_full</span>
      </span>
    </div>
  );
}

const TABS = [
  { key:'home', label:'Accueil', icon:'home' },
  { key:'colis', label:'Mes colis', icon:'package_2', badge:3 },
  { key:'libre', label:'Libre service', icon:'sell' },
  { key:'profile', label:'Profil', icon:'person' },
];
const TABBED = ['home','colis','libre','profile'];
const BRAND_TOP = ['home','login']; // screens whose very top edge is the gradient

function App() {
  const [screen, setScreen] = React.useState('login');
  const nav = (s) => setScreen(s);
  const tabbed = TABBED.includes(screen);
  const brandTop = BRAND_TOP.includes(screen);

  let content;
  switch (screen) {
    case 'login': content = <S.LoginScreen nav={nav} />; break;
    case 'home': content = <S.HomeScreen nav={nav} unread={2} />; break;
    case 'colis': content = <S.MesColisScreen nav={nav} />; break;
    case 'new': content = <S.NewParcelScreen nav={nav} />; break;
    case 'track': content = <S.TrackScreen nav={nav} />; break;
    case 'libre': content = <S.LibreServiceScreen nav={nav} />; break;
    case 'notifications': content = <S.NotificationsScreen nav={nav} />; break;
    case 'profile': content = <S.ProfileScreen nav={nav} />; break;
    default: content = <S.HomeScreen nav={nav} />;
  }

  return (
    <React.Fragment>
      <div className="notch"></div>
      <StatusBar brand={brandTop} />
      <div className="appwrap">
        {!brandTop && <div className="topspacer"></div>}
        <div className="screen">{content}</div>
        {(screen==='home' || screen==='colis') &&
          <div className="fab"><Fab icon="add" onClick={()=>nav('new')} /></div>}
        {tabbed &&
          <div className="tabbarwrap"><TabBar items={TABS} value={screen} onChange={nav} /></div>}
      </div>
    </React.Fragment>
  );
}

// statusbar overlaps the brand hero; pull app content up under it for brand screens
ReactDOM.createRoot(document.getElementById('phone')).render(<App/>);
</script>
</body></html>
