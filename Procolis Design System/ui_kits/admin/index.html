<!-- @dsCard group="Admin" viewport="1280x760" name="Console garage" subtitle="Tableau de bord admin garage — KPIs, colis, chauffeurs, assignations" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<title>PRO COLIS — Console</title>
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%}
  body{background:var(--surface-page);font-family:var(--font-body)}
  #root{height:100vh}
  .console{display:flex;height:100vh;min-height:640px}
  /* sidebar */
  .side{width:248px;flex:none;background:var(--slate-900);color:#fff;display:flex;flex-direction:column;padding:18px 14px}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
  .brand img{width:34px;height:34px;object-fit:contain}
  .brand .w{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.01em}
  .brand .w .o{color:var(--amber-400)}
  .navitem{display:flex;align-items:center;gap:12px;height:42px;padding:0 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,.66);font-family:var(--font-display);font-weight:600;font-size:14px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .12s,color .12s}
  .navitem:hover{background:rgba(255,255,255,.06);color:#fff}
  .navitem.active{background:var(--teal-500);color:#fff}
  .navitem .material-symbols-rounded{font-size:21px}
  .navsec{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.32);padding:16px 12px 6px}
  .side .foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 8px;border-top:1px solid rgba(255,255,255,.1)}
  .side .foot .n{font-family:var(--font-display);font-weight:700;font-size:13.5px}
  .side .foot .r{font-size:11.5px;color:rgba(255,255,255,.55)}
  /* main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .topbar{height:64px;flex:none;display:flex;align-items:center;gap:16px;padding:0 24px;background:var(--surface-card);border-bottom:1px solid var(--border-subtle)}
  .topbar h1{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--text-strong);margin:0}
  .search{display:flex;align-items:center;gap:8px;height:40px;padding:0 14px;background:var(--surface-sunken);border-radius:var(--radius-pill);width:300px;color:var(--text-muted)}
  .search input{border:none;background:transparent;outline:none;font-family:var(--font-body);font-size:14px;color:var(--text-strong);width:100%}
  .content{flex:1;overflow-y:auto;padding:24px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .panels{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
  .panel{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);box-shadow:var(--shadow-xs);overflow:hidden}
  .panel-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border-subtle)}
  .panel-h h3{margin:0;font-family:var(--font-display);font-weight:700;font-size:15.5px;color:var(--text-strong)}
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);padding:11px 18px;border-bottom:1px solid var(--border-subtle)}
  tbody td{padding:13px 18px;border-bottom:1px solid var(--slate-100);font-size:13.5px;color:var(--text-body);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--slate-50)}
  .trk{font-family:var(--font-mono);font-weight:600;font-size:12.5px;color:var(--text-strong)}
  .route{display:inline-flex;align-items:center;gap:6px;color:var(--text-body);font-weight:500}
  .route .material-symbols-rounded{font-size:15px;color:var(--text-faint)}
  .price{font-family:var(--font-mono);font-weight:700;color:var(--teal-600)}
  .chart{display:flex;align-items:flex-end;gap:7px;height:120px;padding:18px}
  .chart .bar{flex:1;background:linear-gradient(180deg,var(--teal-400),var(--teal-600));border-radius:5px 5px 0 0;min-height:6px}
  .driverrow{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--slate-100)}
  .driverrow:last-child{border-bottom:none}
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="mock.js"></script>
<script type="text/babel" data-presets="react">
const NS = window.ProcolisDesignSystem_1720b4;
const { StatBox, StatusBadge, Badge, Avatar, Button, IconButton, Tabs } = NS;
const A = window.PCAdmin;

const NAV = [
  { sec:'Pilotage' },
  { key:'dash', label:'Tableau de bord', icon:'dashboard' },
  { key:'colis', label:'Colis', icon:'package_2' },
  { key:'drivers', label:'Chauffeurs', icon:'local_shipping' },
  { sec:'Gestion' },
  { key:'garages', label:'Garages', icon:'garage' },
  { key:'stats', label:'Statistiques', icon:'monitoring' },
  { key:'reports', label:'Rapports', icon:'description' },
  { key:'settings', label:'Paramètres', icon:'settings' },
];

function Sidebar({ active, onNav }){
  return (
    <aside className="side">
      <div className="brand">
        <img src="../../assets/logo-procolis.png" alt=""/>
        <span className="w">PRO<span className="o">COLIS</span></span>
      </div>
      {NAV.map((it,i)=> it.sec
        ? <div key={i} className="navsec">{it.sec}</div>
        : <button key={i} className={'navitem'+(active===it.key?' active':'')} onClick={()=>onNav(it.key)}>
            <span className="material-symbols-rounded">{it.icon}</span>{it.label}
          </button>)}
      <div className="foot">
        <Avatar name="Konan B." size="sm" status="online"/>
        <div style={{flex:1,minWidth:0}}>
          <div className="n">Konan B.</div><div className="r">Admin · Garage Cocody</div>
        </div>
        <IconButton icon="logout" variant="ghost" style={{color:'rgba(255,255,255,.6)'}}/>
      </div>
    </aside>
  );
}

function ParcelsTable(){
  return (
    <div className="panel">
      <div className="panel-h">
        <h3>Colis récents</h3>
        <Button size="sm" variant="secondary" icon="filter_list">Filtrer</Button>
      </div>
      <table>
        <thead><tr><th>Suivi</th><th>Client</th><th>Trajet</th><th>Chauffeur</th><th>Statut</th><th>Prix</th><th></th></tr></thead>
        <tbody>
          {A.parcels.map((p,i)=>(
            <tr key={i}>
              <td><span className="trk">{p.tracking}</span></td>
              <td>{p.client}</td>
              <td><span className="route">{p.from}<span className="material-symbols-rounded">arrow_right_alt</span>{p.to}</span></td>
              <td>{p.driver
                ? <span style={{display:'inline-flex',alignItems:'center',gap:7}}><Avatar name={p.driver} size="xs"/>{p.driver}</span>
                : <span style={{color:'var(--text-faint)',fontStyle:'italic'}}>Non assigné</span>}</td>
              <td><StatusBadge status={p.status} size="sm"/></td>
              <td><span className="price">{p.price}</span></td>
              <td>{!p.driver
                ? <Button size="sm" icon="person_add">Assigner</Button>
                : <IconButton icon="chevron_right" variant="ghost"/>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function DriversPanel(){
  const dot={online:'var(--green-500)',busy:'var(--amber-400)',offline:'var(--slate-300)'};
  const lbl={online:'Disponible',busy:'En mission',offline:'Hors ligne'};
  return (
    <div className="panel">
      <div className="panel-h"><h3>Chauffeurs</h3><Badge tone="green">3 dispo</Badge></div>
      {A.drivers.map((d,i)=>(
        <div className="driverrow" key={i}>
          <Avatar name={d.name} status={d.status}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:14,color:'var(--text-strong)'}}>{d.name}</div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>{d.vehicle} · {d.rating} ★</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:12,fontWeight:600,color:dot[d.status]==='var(--slate-300)'?'var(--text-faint)':'var(--text-body)'}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:dot[d.status]}}></span>{lbl[d.status]}
            </div>
            <div style={{fontSize:11.5,color:'var(--text-faint)',marginTop:2}}>{d.load} colis</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function VolumePanel(){
  return (
    <div className="panel">
      <div className="panel-h"><h3>Volume de colis · 12 mois</h3><Badge tone="primary">+12%</Badge></div>
      <div className="chart">{A.bars.map((h,i)=><div key={i} className="bar" style={{height:h+'%',opacity:i===A.bars.length-1?1:.55+i*0.03}}></div>)}</div>
    </div>
  );
}

function App(){
  const [active,setActive]=React.useState('dash');
  const titles={dash:'Tableau de bord',colis:'Colis',drivers:'Chauffeurs',garages:'Garages',stats:'Statistiques',reports:'Rapports',settings:'Paramètres'};
  return (
    <div className="console">
      <Sidebar active={active} onNav={setActive}/>
      <div className="main">
        <div className="topbar">
          <h1>{titles[active]}</h1>
          <div className="search"><span className="material-symbols-rounded" style={{fontSize:20}}>search</span><input placeholder="Rechercher un colis, un client…"/></div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
            <IconButton icon="notifications"/><IconButton icon="help"/>
            <Button icon="add">Nouveau colis</Button>
          </div>
        </div>
        <div className="content">
          {active==='drivers'
            ? <div className="panels" style={{gridTemplateColumns:'1fr'}}><DriversPanel/></div>
            : <React.Fragment>
                <div className="kpis">{A.kpis.map((k,i)=><StatBox key={i} {...k}/>)}</div>
                <div className="panels">
                  <div style={{display:'flex',flexDirection:'column',gap:20}}>
                    <ParcelsTable/>
                    <VolumePanel/>
                  </div>
                  <DriversPanel/>
                </div>
              </React.Fragment>}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
