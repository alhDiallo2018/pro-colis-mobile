<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<style>
  body{margin:0;padding:22px;background:var(--surface-page)}
  .wrap{display:flex;flex-direction:column;gap:16px;max-width:440px}
  .lbl{font-family:var(--font-display);font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint)}
  .frame{border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;background:var(--surface-card)}
  .row{display:flex;align-items:center;gap:14px}
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { AppBar, TabBar, Tabs, Fab, IconButton } = window.ProcolisDesignSystem_1720b4;
function Demo(){
  const [tab,setTab]=React.useState('accueil');
  const [seg,setSeg]=React.useState('en-cours');
  return (
    <div className="wrap">
      <div>
        <span className="lbl">App bar — brand</span>
        <div className="frame" style={{marginTop:8}}>
          <AppBar variant="brand" title="PRO COLIS" subtitle="Bonjour, Awa"
            actions={<><IconButton icon="search" variant="ghost" style={{color:'#fff'}}/><IconButton icon="notifications" variant="ghost" style={{color:'#fff'}}/></>}/>
        </div>
      </div>
      <div>
        <span className="lbl">App bar — default + back</span>
        <div className="frame" style={{marginTop:8}}>
          <AppBar title="Détails du colis" subtitle="PC-7F3K-2291" onBack={()=>{}} actions={<IconButton icon="more_vert"/>}/>
        </div>
      </div>
      <div>
        <span className="lbl">Tabs</span>
        <div className="frame" style={{marginTop:8,padding:'0 12px'}}>
          <Tabs value={seg} onChange={setSeg} items={[{value:'en-cours',label:'En cours',count:5},{value:'livres',label:'Livrés',count:28},{value:'annules',label:'Annulés'}]}/>
        </div>
      </div>
      <div className="row">
        <div style={{flex:1}}>
          <span className="lbl">Tab bar</span>
          <div className="frame" style={{marginTop:8}}>
            <TabBar value={tab} onChange={setTab} items={[
              {key:'accueil',label:'Accueil',icon:'home'},
              {key:'colis',label:'Mes colis',icon:'package_2',badge:3},
              {key:'libre',label:'Libre service',icon:'sell'},
              {key:'profil',label:'Profil',icon:'person'},
            ]}/>
          </div>
        </div>
        <div>
          <span className="lbl">FAB</span>
          <div className="row" style={{marginTop:8,gap:12}}>
            <Fab icon="add"/>
            <Fab icon="add" label="Nouveau colis"/>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
